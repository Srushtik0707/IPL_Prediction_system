<!DOCTYPE html>
<html>
<head>
    <title>IPL Match Prediction</title>

    <style>

        body{
            font-family: Arial;
            background: linear-gradient(to right,#1d2671,#c33764);
            color:white;
            text-align:center;
            padding:30px;
        }

        .container{
            background: rgba(255,255,255,0.1);
            padding:30px;
            border-radius:20px;
            width:50%;
            margin:auto;
        }

        input,select{
            width:90%;
            padding:10px;
            margin:10px;
            border:none;
            border-radius:10px;
        }

        button{
            background:orange;
            padding:12px 20px;
            border:none;
            border-radius:10px;
            cursor:pointer;
            font-size:18px;
        }

        button:hover{
            background:yellow;
        }

        h1{
            color:#ffd700;
        }

        .result{
            margin-top:20px;
            font-size:24px;
            color:#00ffcc;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>IPL Match Winner Prediction</h1>

        <form method="POST">

            <select name="team1" required>
                <option value="">Select Team 1</option>

                {% for team in teams %}
                <option value="{{team}}">{{team}}</option>
                {% endfor %}
            </select>

            <select name="team2" required>
                <option value="">Select Team 2</option>

                {% for team in teams %}
                <option value="{{team}}">{{team}}</option>
                {% endfor %}
            </select>

            <select name="toss_winner" required>
                <option value="">Select Toss Winner</option>

                {% for team in teams %}
                <option value="{{team}}">{{team}}</option>
                {% endfor %}
            </select>

            <select name="venue" required>
                <option value="">Select Venue</option>

                {% for venue in venues %}
                <option value="{{venue}}">{{venue}}</option>
                {% endfor %}
            </select>

            <select name="pitch_type" required>
                <option value="">Pitch Type</option>

                {% for pitch in pitch_types %}
                <option value="{{pitch}}">{{pitch}}</option>
                {% endfor %}
            </select>

            <select name="weather" required>
                <option value="">Weather</option>

                {% for weather in weather_conditions %}
                <option value="{{weather}}">{{weather}}</option>
                {% endfor %}
            </select>

            <input type="number" name="total_score" placeholder="Total Score" required>

            <input type="number" name="wickets" placeholder="Wickets" required>

            <input type="number" step="0.1" name="overs" placeholder="Overs" required>

            <button type="submit">Predict Winner</button>

        </form>

        <div class="result">
            {{prediction}}
        </div>

    </div>

</body>
</html>
